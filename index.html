<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        <h1 class="logo">E-closet</h1>
        <div class="search-container">
            <input type="text" placeholder="Buscar...">
            <button>Buscar</button>
        </div>
    </header>

    <section class="hero">

        <div class="hero-text">
        <h2>
            E-Closet <br>
            Veja roupas e <br>
            acessórios <br>
            online.
        </h2>

        <button>Categoria</button>
        </div>

        <div class="hero-image">

            <img src="./img/sueter-masculino-de-trico-listrado-anka-preto-fiero 1.png" alt="">

        </div>

    </section>

    <nav class="categories">

        <a href="#" onclick="carregarCategoria(`women's clothing`)">Feminino</a>

        <a href="#" onclick="carregarCategoria(`men's clothing`)">Masculino</a>

        <a href="#" onclick="carregarCategoria(`jewelery`)">Acessórios</a>

    </nav>

    <section class="products" id="products"></section>

    <section class="detalhes hidden"id="detalhes"></section>

    <footer>

    <div class="footer-box">
      <h3>E-closet</h3>
      <p>Moda para quem busca diferenciar o closet</p>

      <div class="social">
        <span>Intagram</span>
        <span>Facebook</span>
        <span>Twitter</span>
      </div>
    </div>

    <div class="footer-box">
      <h3>Comprar</h3>
      <p>Acabamos os pagamentos por PIX</p>
      <p>Pix</p>
      <p>Cartão</p>
    </div>

    <div class="footer-box">
      <h3>Ajuda</h3>
      <p>Precisando de algo mande um Email</p>
      <p>ecloset@ecloset.com.br</p>
    </div>

  </footer>
</body>
</html>
